<!DOCTYPE html>
<html lang="en">
<head>

    <title>VoxAlign | Dataset Download</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full bg-slate-800 rounded-2xl shadow-2xl p-8 md:p-12 text-center border border-slate-700">

            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>

            <p class="mt-2"><a href="https://github.com/bhargavm-iiits/Vox-Align" class="text-teal-400 hover:underline transition-colors hover:text-teal-300">Return to GitHub Repository</a></p>
